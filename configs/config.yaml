# Example task configuration for the coding agent.
# Edit this file (or make a copy) rather than hardcoding values in main.py.

exp_name: "ML2025_HW2"
data_dir: "data/ML2025Spring-hw2-public"

task_goal: >
  Given the survey results from the past two days in a specific state in
  the U.S., predict the probability of testing positive on day 3.
  The evaluation metric is Mean Squared Error (MSE).

llm:
  backend: "openai"             # openai | llama_cpp (see src/llm/backend.py)
  model: "gpt-4o-mini"           # used when backend is "openai"
  max_tokens: 4096
  temperature: 0.0

  # --- settings below only apply when backend is "llama_cpp" ---
  model_path: "models/Meta-Llama-3.1-8B-Instruct-Q8_0.gguf"
  n_gpu_layers: -1
  n_ctx: 8192

agent:
  steps: 1                # number of search iterations to run
  reflection:
    enabled: true                 # whether to run a critic pass before executing code
    max_revisions: 1              # how many times to let the critic ask for a rewrite
  search:
    debug_prob: 0.5              # probability of debugging a buggy node vs improving one
    num_drafts: 1                 # number of initial drafts before improving/debugging
    exploration_constant: 1.0     # UCB1 exploration weight: higher = more exploration of
                                   # less-developed branches, lower = more greedy exploitation

interpreter:
  timeout: 3600                 # max wall-clock seconds for a single code execution
  max_memory_mb: 4096            # hard memory cap for the child process (POSIX only)
  max_cpu_seconds: null          # hard CPU-time cap (POSIX only); null = no separate CPU limit
  block_network: true            # best-effort: block socket creation in generated code
